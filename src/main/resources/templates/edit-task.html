<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Task</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>Edit Task</h2>
    <form th:action="@{/tasks/add}" method="post"> <input type="hidden" name="id" th:value="${task.id}">
        <input type="text" name="description" th:value="${task.description}" required>

        <select name="category">
            <option th:each="cat : ${categories}" th:value="${cat}"
                    th:text="${cat}" th:selected="${cat == task.category}"></option>
        </select>

        <select name="priority">
            <option th:each="prio : ${priorities}" th:value="${prio}"
                    th:text="${prio}" th:selected="${prio == task.priority}"></option>
        </select>

        <button type="submit">Save Changes</button>
        <a th:href="@{/tasks}">Cancel</a>
    </form>
</div>
</body>
</html>
