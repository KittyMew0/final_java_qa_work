<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My To-Do App</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <p>Welcome, <strong th:text="${session.loggedInUser.username}">User</strong>!</p>
        <a th:href="@{/logout}"><button style="background-color: #f44336; color: white; border: none; padding: 5px 10px; cursor: pointer;">Logout</button></a>
    </div>

    <div class="status-bar" th:with="total=${tasks.size()}, completedCount=${tasks.stream().filter(t -> t.completed).count()}">
        <p>
            Progress: <span th:text="${completedCount}">0</span> / <span th:text="${total}">0</span> tasks done
        </p>
        <div style="background-color: #eee; border-radius: 10px; height: 10px; width: 100%;">
            <div th:style="'background-color: #4CAF50; height: 100%; border-radius: 10px; width: ' +
                      (${total} > 0 ? (${completedCount} * 100 / ${total}) : 0) + '%'">
            </div>
        </div>
    </div>

    <h1>My Tasks</h1>

    <form th:action="@{/tasks/add}" method="post" style="margin-bottom: 20px;">
        <input type="text" name="description" placeholder="New task..." required>
        <select name="category">
            <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
        </select>
        <select name="priority">
            <option th:each="prio : ${priorities}" th:value="${prio}" th:text="${prio}"></option>
        </select>
        <button type="submit">Add Task</button>
    </form>

    <hr>

    <div th:each="cat : ${categories}"
         th:if="${tasks.stream().anyMatch(t -> t.category == cat)}"
         class="category-section">
        <div class="category-header" th:text="${cat}">Category Name</div>

        <div th:each="task : ${tasks}" th:if="${task.category == cat}"
             th:classappend="${task.completed} ? 'task-completed' : ''" class="task-item">

            <div>
                <span th:text="${task.description}"></span>
                <small th:class="'priority-' + ${task.priority}" th:text="'[' + ${task.priority} + ']'"></small>
            </div>

            <div class="actions">
                <form th:action="@{/tasks/toggle/{id}(id=${task.id})}" method="post" style="display:inline;">
                    <button type="submit" th:text="${task.completed} ? 'Undo' : 'Done'"></button>
                </form>
                <a th:href="@{/tasks/edit/{id}(id=${task.id})}"><button>Edit</button></a>
                <form th:action="@{/tasks/delete/{id}(id=${task.id})}" method="post" style="display:inline;">
                    <button type="submit" style="color:red;">X</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
